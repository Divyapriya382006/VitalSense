<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0c1824; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { position: relative; width: 100%; height: 100%; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0.3; } /* Mirrored and tinted */
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .loading { position: absolute; color: #00e5ff; font-family: monospace; font-size: 14px; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .pulse { animation: pulseAnim 1.5s infinite; }
        @keyframes pulseAnim { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div class="container">
        <video class="input_video" autoplay playsinline></video>
        <canvas class="output_canvas"></canvas>
        <div class="loading pulse" id="status">LOADING MEDIAPIPE FACE MESH MODEL...<br><span style="font-size:10px; color:#4a6478">Authentic ML Tracking Initialization</span></div>
    </div>
    <script>
        const videoElement = document.getElementsByClassName('input_video')[0];
        const canvasElement = document.getElementsByClassName('output_canvas')[0];
        const canvasCtx = canvasElement.getContext('2d');
        const status = document.getElementById('status');

        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        faceMesh.onResults((results) => {
            status.style.display = 'none';
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // Draw cyan tint overlay
            canvasCtx.fillStyle = 'rgba(0, 229, 255, 0.05)';
            canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.multiFaceLandmarks) {
                for (const landmarks of results.multiFaceLandmarks) {
                    drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, {color: 'rgba(0, 229, 255, 0.1)', lineWidth: 0.5});
                    drawConnectors(canvasCtx, landmarks, FACEMESH_RIGHT_EYE, {color: '#00e5ff', lineWidth: 1.5});
                    drawConnectors(canvasCtx, landmarks, FACEMESH_LEFT_EYE, {color: '#00e5ff', lineWidth: 1.5});
                    drawConnectors(canvasCtx, landmarks, FACEMESH_FACE_OVAL, {color: '#00e5ff', lineWidth: 1.5});
                    drawConnectors(canvasCtx, landmarks, FACEMESH_LIPS, {color: '#f48fb1', lineWidth: 1.0});

                    for (let i = 0; i < landmarks.length; i++) {
                        const {x, y} = landmarks[i];
                        canvasCtx.beginPath();
                        canvasCtx.arc(x * canvasElement.width, y * canvasElement.height, 1.2, 0, 2 * Math.PI);
                        canvasCtx.fillStyle = '#00e5ff';
                        canvasCtx.fill();
                    }
                }
            }
            canvasCtx.restore();
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        
        camera.start().catch((err) => {
            status.innerHTML = "Camera access denied. Please allow webcam permissions in Chrome.";
            status.style.color = "#ff5252";
            status.classList.remove('pulse');
        });
    </script>
</body>
</html>
